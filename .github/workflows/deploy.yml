name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/kdl_bd
            git pull origin main
            
            # Create .env from secrets
            echo "DATABASE_URL=\"postgresql://kdl_user:kdl_password@db:5432/kdl_bd?schema=public\"" > server/.env
            echo "BOT_TOKEN=\"${{ secrets.BOT_TOKEN }}\"" >> server/.env
            cp server/.env .env
            
            # Restart containers
            docker compose up -d --build
            
            # Run migrations
            docker compose exec -T api npx prisma db push --accept-data-loss
            docker compose exec -T api node src/migrate.js
